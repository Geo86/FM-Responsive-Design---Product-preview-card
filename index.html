<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="favicon" sizes="32x32" href="assets/images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  
  <title>Frontend Mentor | Product preview card component</title>

</head>
<body>
      <article class="product-card">
          <div class="product-card__img">
          <picture>
            <source media="(min-width: 37em)" srcset="assets/images/image-product-desktop.jpg">
            <img src="assets/images/image-product-mobile.jpg" alt="Gabrielle Essence Eau De Parfum">
          </picture>
          </div>
          <div class="product-card__content">
            <p class="product-card__category">Perfume</p>
            
            <h2 class="product-card__title">Gabrielle Essence Eau De Parfum</h2>
            
            <p class="product-card__description">
              A floral, solar and voluptuous interpretation composed by Olivier Polge,
              Perfumer-Creator for the House of CHANEL.
            </p>
            
            <div class="product-card__pricing">
              <span class="product-card__price">$149.99</span>
              <span class="product-card__price-old">$169.99</span>
            </div>
            <!-- Button -->
             <button class="product-card__button">
              <img src="assets/images/icon-cart.svg" alt="" aria-hidden="true">
              <span>Add to Cart</span>
            </button>
          </div>
        </article>
</body>
</html>
